openapi: 3.0.3
info:
  title: Cafe Surabaya API
  description: REST API untuk aplikasi direktori dan rekomendasi cafe berbasis komunitas di area Surabaya
  version: 1.0.0
  contact:
    name: Cafe Surabaya Team

servers:
  - url: http://localhost:3000
    description: Development server
  - url: https://api-cafe-surabaya.railway.app
    description: Production server

tags:
  - name: Health
    description: Server health check
  - name: Auth
    description: Authentication and user management
  - name: Master Data
    description: Categories and tags
  - name: Places
    description: Cafe places management
  - name: Favorites
    description: User favorite places
  - name: Recommendations
    description: Place recommendations
  - name: Reviews
    description: Place reviews and ratings
  - name: Admin Settings
    description: Application settings management
  - name: Admin Places
    description: Place moderation
  - name: Admin Moderation
    description: Reports, edit requests, reviews, and photos moderation

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from /api/auth/login or /api/auth/register

  schemas:
    User:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
          maxLength: 100
        email:
          type: string
          format: email
        role:
          type: string
          enum: [user, admin, super_admin]
          default: user
        avatarUrl:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        isActive:
          type: boolean
          default: true
        lastLoginAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Category:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
          maxLength: 80
        slug:
          type: string
          maxLength: 100
        icon:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        sortOrder:
          type: integer
          default: 0
        isActive:
          type: boolean
          default: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Tag:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
          maxLength: 80
        slug:
          type: string
          maxLength: 100
        type:
          type: string
          enum: [facility, vibe, purpose, payment]
        icon:
          type: string
          nullable: true
        isActive:
          type: boolean
          default: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Place:
      type: object
      properties:
        id:
          type: string
        categoryId:
          type: string
        submittedBy:
          type: string
          nullable: true
        approvedBy:
          type: string
          nullable: true
        duplicateOfPlaceId:
          type: string
          nullable: true
        name:
          type: string
          maxLength: 150
        slug:
          type: string
          maxLength: 180
        description:
          type: string
          nullable: true
        address:
          type: string
        district:
          type: string
          nullable: true
        subdistrict:
          type: string
          nullable: true
        city:
          type: string
          default: Surabaya
        postalCode:
          type: string
          nullable: true
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double
        mapPinVerified:
          type: boolean
          default: false
        lastVerifiedAt:
          type: string
          format: date-time
          nullable: true
        priceMin:
          type: integer
          nullable: true
        priceMax:
          type: integer
          nullable: true
        phone:
          type: string
          nullable: true
        websiteUrl:
          type: string
          nullable: true
        instagramUrl:
          type: string
          nullable: true
        googleMapsUrl:
          type: string
          nullable: true
        coverPhotoUrl:
          type: string
          nullable: true
        avgRating:
          type: number
          format: double
          default: 0
        ratingCount:
          type: integer
          default: 0
        favoriteCount:
          type: integer
          default: 0
        recommendationCount:
          type: integer
          default: 0
        reportCount:
          type: integer
          default: 0
        status:
          type: string
          enum: [pending, approved, rejected, archived]
          default: pending
        approvedVia:
          type: string
          enum: [auto, manual]
          nullable: true
        rejectionReason:
          type: string
          nullable: true
        isPermanentlyClosed:
          type: boolean
          default: false
        submittedAt:
          type: string
          format: date-time
        reviewedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PlaceWithDetails:
      allOf:
        - $ref: '#/components/schemas/Place'
        - type: object
          properties:
            category:
              $ref: '#/components/schemas/Category'
            placeTags:
              type: array
              items:
                type: object
                properties:
                  tag:
                    $ref: '#/components/schemas/Tag'
            openingHours:
              type: array
              items:
                $ref: '#/components/schemas/OpeningHour'
            photos:
              type: array
              items:
                $ref: '#/components/schemas/PlacePhoto'
            distance:
              type: number
              nullable: true
              description: Distance in km from user location

    OpeningHour:
      type: object
      properties:
        id:
          type: string
        placeId:
          type: string
        dayOfWeek:
          type: integer
          minimum: 0
          maximum: 6
        openTime:
          type: string
          nullable: true
        closeTime:
          type: string
          nullable: true
        isClosed:
          type: boolean
          default: false
        is24Hours:
          type: boolean
          default: false
        spansNextDay:
          type: boolean
          default: false
        note:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PlacePhoto:
      type: object
      properties:
        id:
          type: string
        placeId:
          type: string
        uploadedBy:
          type: string
          nullable: true
        photoUrl:
          type: string
        storagePath:
          type: string
          nullable: true
        caption:
          type: string
          nullable: true
        isCover:
          type: boolean
          default: false
        status:
          type: string
          enum: [pending, approved, rejected, archived]
          default: pending
        approvedBy:
          type: string
          nullable: true
        approvedVia:
          type: string
          enum: [auto, manual]
          nullable: true
        rejectionReason:
          type: string
          nullable: true
        reviewedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Review:
      type: object
      properties:
        id:
          type: string
        placeId:
          type: string
        userId:
          type: string
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string
          nullable: true
        status:
          type: string
          enum: [pending, approved, rejected, archived]
          default: pending
        approvedBy:
          type: string
          nullable: true
        approvedVia:
          type: string
          enum: [auto, manual]
          nullable: true
        rejectionReason:
          type: string
          nullable: true
        reviewedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Favorite:
      type: object
      properties:
        userId:
          type: string
        placeId:
          type: string
        createdAt:
          type: string
          format: date-time

    Report:
      type: object
      properties:
        id:
          type: string
        placeId:
          type: string
        reportedBy:
          type: string
        reasonType:
          type: string
          enum: [wrong_location, closed, duplicate, inappropriate, wrong_information, other]
        description:
          type: string
          nullable: true
        status:
          type: string
          enum: [open, reviewed, resolved, rejected]
          default: open
        resolvedBy:
          type: string
          nullable: true
        resolutionNote:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        resolvedAt:
          type: string
          format: date-time
          nullable: true

    EditRequest:
      type: object
      properties:
        id:
          type: string
        placeId:
          type: string
        submittedBy:
          type: string
        proposedData:
          type: object
        status:
          type: string
          enum: [pending, approved, rejected, archived]
          default: pending
        reviewedBy:
          type: string
          nullable: true
        reviewNote:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        reviewedAt:
          type: string
          format: date-time
          nullable: true

    AppSettings:
      type: object
      properties:
        id:
          type: string
        placeApprovalMode:
          type: string
          enum: [auto, manual, hybrid]
          default: manual
        reviewApprovalMode:
          type: string
          enum: [auto, manual, hybrid]
          default: auto
        photoApprovalMode:
          type: string
          enum: [auto, manual, hybrid]
          default: manual
        allowUserPlaceSubmission:
          type: boolean
          default: true
        allowUserReviews:
          type: boolean
          default: true
        updatedBy:
          type: string
          nullable: true
        updatedAt:
          type: string
          format: date-time

    ModerationLog:
      type: object
      properties:
        id:
          type: string
        adminId:
          type: string
          nullable: true
        targetType:
          type: string
          enum: [place, photo, review, edit_request, report, setting, user]
        targetId:
          type: string
        action:
          type: string
          enum: [approve, reject, archive, restore, update, update_setting, resolve_report]
        note:
          type: string
          nullable: true
        beforeData:
          type: object
          nullable: true
        afterData:
          type: object
          nullable: true
        createdAt:
          type: string
          format: date-time

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
        data:
          type: object
        meta:
          type: object
          properties:
            total:
              type: integer
            page:
              type: integer
            limit:
              type: integer
            totalPages:
              type: integer

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
        errors:
          type: object
          nullable: true

paths:
  /health:
    get:
      tags: [Health]
      summary: Check server health
      responses:
        '200':
          description: Server is running
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  timestamp:
                    type: string
                    format: date-time

  /api/auth/register:
    post:
      tags: [Auth]
      summary: Register new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name:
                  type: string
                  maxLength: 100
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 6
                phone:
                  type: string
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          id:
                            type: string
                          name:
                            type: string
                          email:
                            type: string
                          role:
                            type: string
                          token:
                            type: string
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Email already registered

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          token:
                            type: string
                          user:
                            $ref: '#/components/schemas/User'
        '401':
          description: Invalid credentials

  /api/auth/me:
    get:
      tags: [Auth]
      summary: Get current user profile
      security:
        - BearerAuth: []
      responses:
        '200':
          description: User profile retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/User'
        '401':
          description: Authentication required

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Logout user
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Logout successful

  /api/categories:
    get:
      tags: [Master Data]
      summary: Get all active categories
      responses:
        '200':
          description: Categories retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Category'

  /api/tags:
    get:
      tags: [Master Data]
      summary: Get all active tags
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [facility, vibe, purpose, payment]
          description: Filter by tag type
      responses:
        '200':
          description: Tags retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Tag'

  /api/places:
    get:
      tags: [Places]
      summary: Get approved places with filters
      parameters:
        - name: search
          in: query
          schema:
            type: string
          description: Search by name, address, or description
        - name: category_id
          in: query
          schema:
            type: string
          description: Filter by category ID
        - name: tag_ids
          in: query
          schema:
            type: string
          description: Comma-separated tag IDs
        - name: district
          in: query
          schema:
            type: string
          description: Filter by district
        - name: min_rating
          in: query
          schema:
            type: number
          description: Minimum rating filter
        - name: price_min
          in: query
          schema:
            type: integer
          description: Minimum price filter
        - name: price_max
          in: query
          schema:
            type: integer
          description: Maximum price filter
        - name: lat
          in: query
          schema:
            type: number
          description: User latitude for distance calculation
        - name: lng
          in: query
          schema:
            type: number
          description: User longitude for distance calculation
        - name: radius_km
          in: query
          schema:
            type: number
          description: Filter places within radius in km
        - name: sort
          in: query
          schema:
            type: string
            enum: [distance, rating, newest, recommended]
          description: Sort order
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: Page number
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
          description: Items per page
      responses:
        '200':
          description: Places retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/PlaceWithDetails'
    post:
      tags: [Places]
      summary: Submit new place recommendation
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, address, categoryId, latitude, longitude]
              properties:
                name:
                  type: string
                  maxLength: 150
                description:
                  type: string
                address:
                  type: string
                district:
                  type: string
                categoryId:
                  type: string
                latitude:
                  type: number
                longitude:
                  type: number
                priceMin:
                  type: integer
                priceMax:
                  type: integer
                phone:
                  type: string
                websiteUrl:
                  type: string
                instagramUrl:
                  type: string
                googleMapsUrl:
                  type: string
      responses:
        '201':
          description: Place submitted successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Place'
        '401':
          description: Authentication required
        '403':
          description: User place submission disabled

  /api/places/{id}:
    get:
      tags: [Places]
      summary: Get place details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Place ID
      responses:
        '200':
          description: Place retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PlaceWithDetails'
        '404':
          description: Place not found

  /api/places/{id}/photos:
    post:
      tags: [Places]
      summary: Upload place photo
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Place ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [photoUrl]
              properties:
                photoUrl:
                  type: string
                caption:
                  type: string
                isCover:
                  type: boolean
      responses:
        '201':
          description: Photo uploaded successfully

  /api/places/{id}/edit-requests:
    post:
      tags: [Places]
      summary: Submit edit request for a place
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Place ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [proposedData]
              properties:
                proposedData:
                  type: object
                  description: JSON object with proposed changes
      responses:
        '201':
          description: Edit request submitted

  /api/places/{id}/reports:
    post:
      tags: [Places]
      summary: Report a place
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Place ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reasonType]
              properties:
                reasonType:
                  type: string
                  enum: [wrong_location, closed, duplicate, inappropriate, wrong_information, other]
                description:
                  type: string
      responses:
        '201':
          description: Report submitted

  /api/favorites:
    get:
      tags: [Favorites]
      summary: Get user's favorite places
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Favorites retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Favorite'

  /api/places/{id}/favorite:
    post:
      tags: [Favorites]
      summary: Add place to favorites
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '201':
          description: Added to favorites
        '400':
          description: Already in favorites
    delete:
      tags: [Favorites]
      summary: Remove place from favorites
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Removed from favorites

  /api/places/{id}/recommend:
    post:
      tags: [Recommendations]
      summary: Recommend a place
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '201':
          description: Place recommended
        '400':
          description: Already recommended
    delete:
      tags: [Recommendations]
      summary: Cancel place recommendation
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Recommendation removed

  /api/places/{id}/reviews:
    get:
      tags: [Reviews]
      summary: Get reviews for a place
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Reviews retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Review'
    post:
      tags: [Reviews]
      summary: Create a review for a place
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rating]
              properties:
                rating:
                  type: integer
                  minimum: 1
                  maximum: 5
                comment:
                  type: string
      responses:
        '201':
          description: Review submitted
        '400':
          description: Already reviewed this place

  /api/reviews/{id}:
    put:
      tags: [Reviews]
      summary: Update own review
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                rating:
                  type: integer
                  minimum: 1
                  maximum: 5
                comment:
                  type: string
      responses:
        '200':
          description: Review updated
        '404':
          description: Review not found
    delete:
      tags: [Reviews]
      summary: Delete own review
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Review deleted

  /api/admin/settings:
    get:
      tags: [Admin Settings]
      summary: Get application settings
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Settings retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AppSettings'
    put:
      tags: [Admin Settings]
      summary: Update application settings
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
